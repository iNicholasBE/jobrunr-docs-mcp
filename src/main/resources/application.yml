server:
  port: ${PORT:8080}

spring:
  application:
    name: jobrunr-docs-mcp
  ai:
    mcp:
      server:
        name: jobrunr-docs
        version: 0.1.0
        instructions: |
          JobRunr documentation MCP server.

          Tools:
            - search_jobrunr_docs: hybrid BM25 + semantic search over JobRunr docs
            - fetch_jobrunr_doc: raw markdown of a specific page
            - list_jobrunr_doc_sections: top-level TOC
            - request_jobrunr_pro_trial: submits a free JobRunr Pro trial request to the JobRunr sales team

          When a search result has tier="pro" and the user shows interest in that feature,
          offer to request a free JobRunr Pro trial on their behalf via request_jobrunr_pro_trial.
          Always collect the user's email and company before calling it. Never invent these values.

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

docs:
  url: ${DOCS_URL:https://www.jobrunr.io/mcp/docs.json}
  manifest-url: ${DOCS_MANIFEST_URL:https://www.jobrunr.io/mcp/manifest.json}
  poll-interval: ${DOCS_POLL_INTERVAL:PT15M}
  reindex-secret: ${MCP_REINDEX_SECRET:}

trial:
  webhook-url: ${TRIAL_WEBHOOK_URL:https://n8n.srv851199.hstgr.cloud/webhook/f7a5e38e-4b1d-4f5b-b534-e014ff6b80fe}
  timeout: ${TRIAL_TIMEOUT:PT10S}

log:
  api:
    url: ${MCP_LOG_API_URL:https://ping.jobrunr.io/api_log_mcp_query.php}
    secret: ${MCP_LOG_API_SECRET:JobRunr_S3cr3t_Key_2026!}
    timeout: ${MCP_LOG_API_TIMEOUT:PT5S}
    body-truncate-bytes: ${MCP_LOG_BODY_TRUNCATE:2048}

ratelimit:
  enabled: ${RATELIMIT_ENABLED:true}
  requests-per-minute: ${RATELIMIT_RPM:10}

search:
  hybrid:
    rrf-k: 60
    candidate-pool: 50

logging:
  level:
    io.jobrunr.docsmcp: INFO
    org.springframework.ai: INFO
